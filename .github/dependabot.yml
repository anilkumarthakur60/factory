# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    # Group related dev-tool bumps into single PRs to cut noise.
    groups:
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
      prettier:
        patterns:
          - 'prettier'
          - 'prettier-*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      build-and-test:
        patterns:
          - 'tsup'
          - 'vitest'
          - '@vitest/*'
      vitepress:
        patterns:
          - 'vitepress'
    # Hold back majors — they almost always need human eyes. Allow only
    # patch/minor in the auto-PR stream; majors will be raised individually.
    #
    # TypeScript specifically: do NOT move to 7.x yet. TS 7 rewrote the
    # compiler's Node API, and as of typescript@7.0.2 both tsup's declaration
    # build and typescript-eslint crash against it:
    #   tsup              -> TypeError: ... reading 'useCaseSensitiveFileNames'
    #   typescript-eslint -> TypeError: ... reading 'Cjs'
    # Plain `tsc --noEmit` and vitest are fine — it is the tooling that lags.
    # Revisit once tsup and typescript-eslint declare TS 7 support.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions used in workflows (actions/checkout, setup-node, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - '*'
