# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    # Group related dev-tool bumps into single PRs to cut noise.
    groups:
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
      prettier:
        patterns:
          - 'prettier'
          - 'prettier-*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      vite:
        patterns:
          - 'vite'
          - 'vite-*'
          - 'vitest'
          - '@vitest/*'
      vitepress:
        patterns:
          - 'vitepress'
    # Hold back majors — they almost always need human eyes. Allow only
    # patch/minor in the auto-PR stream; majors will be raised individually.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions used in workflows (actions/checkout, setup-node, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - '*'
