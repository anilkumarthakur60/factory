name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for `npm publish --provenance` to mint a signed attestation.
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # `npm publish` triggers the package's `prepublishOnly` script, which
      # already runs: clean → typecheck → lint → format:check → test → build.
      # No need to repeat those steps here.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
